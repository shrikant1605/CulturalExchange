<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${post.title}">Post</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
</head>
<body class="container py-4">
<a href="/">← Back</a>
<h2 th:text="${post.title}">Title</h2>
<div class="text-muted" th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></div>
<div class="mt-3" th:utext="${#strings.replace(post.content, '\n', '<br/>')}"></div>
<div class="mt-2"><span class="badge bg-secondary" th:if="${post.country}" th:text="${post.country}"></span></div>
</body>
</html>
