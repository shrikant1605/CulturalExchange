<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>New Post</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
</head>
<body class="container py-4">
<h2>Create a new cultural post</h2>
<form method="post" action="/posts" class="mt-3">
    <div class="mb-3">
        <label class="form-label">Title</label>
        <input class="form-control" type="text" name="title" th:value="${form.title}" required />
    </div>
    <div class="mb-3">
        <label class="form-label">Country (optional)</label>
        <input class="form-control" type="text" name="country" th:value="${form.country}" />
    </div>
    <div class="mb-3">
        <label class="form-label">Content</label>
        <textarea class="form-control" name="content" rows="8" required th:text="${form.content}"></textarea>
    </div>
    <button class="btn btn-primary" type="submit">Publish</button>
    <a class="btn btn-secondary" href="/">Cancel</a>
    </form>
</body>
</html>
