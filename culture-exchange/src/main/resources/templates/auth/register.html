<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
</head>
<body class="container py-5">
<h2>Register</h2>
<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
<form method="post" action="/register" class="mt-3">
    <div class="mb-3">
        <label class="form-label">Name</label>
        <input class="form-control" type="text" name="name" th:value="${form.name}" required />
    </div>
    <div class="mb-3">
        <label class="form-label">Email</label>
        <input class="form-control" type="email" name="email" th:value="${form.email}" required />
    </div>
    <div class="mb-3">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" name="password" required />
    </div>
    <button class="btn btn-primary" type="submit">Create account</button>
    <a class="btn btn-link" href="/login">Back to login</a>
    </form>
</body>
</html>
