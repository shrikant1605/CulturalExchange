spring:
  application:
    name: culture-exchange
  datasource:
    url: jdbc:h2:mem:culturedb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console
  thymeleaf:
    cache: false

server:
  port: 8080

flyway:
  enabled: true
  locations: classpath:db/migration

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/culturedb}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
